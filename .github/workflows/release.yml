name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:h5
        env:
          VITE_BASE_PATH: ./
      - run: npm run verify:build
      - name: Package PWA
        run: |
          cd dist/build/h5
          zip -r ../../MatchPoint-PWA.zip .
          cd ../..
          sha256sum MatchPoint-PWA.zip > SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/MatchPoint-PWA.zip \
            dist/SHA256SUMS.txt \
            --title "Match Point $GITHUB_REF_NAME" \
            --generate-notes
